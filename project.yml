name: VoxBridge
options:
  bundleIdPrefix: com.voxbridge
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_NSMicrophoneUsageDescription: "VoxBridge uses the microphone to listen to speech for real-time translation"
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"

targets:
  VoxBridge:
    type: application
    platform: iOS
    sources:
      - VoxBridge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voxbridge.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_ALLOWED: NO
    info:
      path: VoxBridge/Info.plist
      properties:
        NSMicrophoneUsageDescription: "VoxBridge uses the microphone to listen to speech for real-time translation"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
